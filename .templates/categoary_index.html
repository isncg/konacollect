<!DOCTYPE html>
<link rel="stylesheet" href="{{ doc_root }}css/categoary_index.css">
<html>
{% for item in item_list %}
<div>
    <div class="categoary_info"><div class="categoary_name">{{ item.title }}</div></div>
    {% for post in item.post_list %}
    <div class="categoary_img_frame">
        <img class="categoary_img" src="{{ post.preview_url }}">
    </div>
    {% endfor %}
    <div style="clear: both;"></div>
</div>
{% endfor %}

</html>
