    <div class="topbar">
        <div class="logo_group">
            <img class="logo" src="https://konachan.net/images/logo.png">
        </div>
        <div class="permalink_list">
            {% for link in permalinks %}
            <a class="permalink" href="{{ link.href }}">{{ link.title }}</a>
            {% endfor %}
        </div>
        <div class="title_group">
            <div class="title">{{ title }}</div>
            <div class="subtitle">{{ subtitle }}</div>
        </div>
    </div>
